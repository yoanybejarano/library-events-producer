name: Enterprise Java CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

# We can remove the FORCE variable now if we use the absolute latest tags
jobs:
  lint:
    name: Code Quality (Checkstyle/PMD)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.7 # Using a specific minor tag often clears the metadata warning
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'oracle'
          cache: 'maven'
      - name: Run Static Analysis
        run: mvn checkstyle:check pmd:check

  security:
    name: Security Scan (SpotBugs/Snyk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.7
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'oracle'
      - name: SpotBugs Scan
        run: mvn spotbugs:check

  test:
    name: Unit & Integration Tests
    needs: [lint, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.7
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'oracle'
          cache: 'maven'
      - name: Run Tests with JaCoCo
        run: mvn clean verify

  package:
    name: Package JAR
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.7
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'oracle'
      - name: Build Final JAR
        run: mvn package -DskipTests