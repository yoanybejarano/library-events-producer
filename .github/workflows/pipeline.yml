name: Java CI with Quality Gates

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  # This tells GitHub to use Node 24 immediately
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # v4 is already updated for Node 24 compatibility

      - name: Set up JDK 21
        uses: actions/setup-java@v5 # This is the version that officially moved to Node 24
        with:
          java-version: '21'
          distribution: 'oracle'
          cache: 'maven'

      - name: Build and Run Quality Checks
        run: mvn -B clean verify

      - name: Upload Analysis Reports
        if: failure()
        uses: actions/upload-artifact@v7 # Use v7 to resolve the Node 20 deprecation
        with:
          name: quality-reports
          path: |
            target/checkstyle-result.xml
            target/pmd.xml
            target/spotbugsXml.xml
            target/site/jacoco/