name: Java CI with Quality Gates

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  # This tells GitHub to use Node 24 immediately and silences the deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6 # Updated from v4

      - name: Set up JDK 21
        uses: actions/setup-java@v6 # Updated from v4
        with:
          java-version: '21'
          distribution: 'oracle'
          cache: 'maven'

      - name: Build and Run Quality Checks
        run: mvn -B clean verify

      - name: Upload Analysis Reports
        if: failure()
        uses: actions/upload-artifact@v6 # Updated from v4
        with:
          name: quality-reports
          path: |
            target/checkstyle-result.xml
            target/pmd.xml
            target/spotbugsXml.xml
            target/site/jacoco/