name: Java CI with Quality Gates

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'oracle' # Matching your Java(TM) SE Runtime Environment
          cache: 'maven'

      - name: Build and Run Quality Checks
        # 'verify' runs unit tests, checkstyle, pmd, and spotbugs as configured in your pom.xml
        run: mvn -B clean verify

      - name: Upload Analysis Reports
        # This allows you to download the HTML reports if the build fails
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: |
            target/checkstyle-result.xml
            target/pmd.xml
            target/spotbugsXml.xml
            target/site/jacoco/